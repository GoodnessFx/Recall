<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: white;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo {
      width: 24px;
      height: 24px;
      background: white;
      border-radius: 6px;
    }
    h1 {
      font-size: 18px;
      margin: 0;
    }
    .status {
      font-size: 14px;
      color: #a3a3a3;
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      background: white;
      color: black;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #e5e5e5;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"></div>
    <h1>Recall</h1>
  </div>
  <div id="status" class="status">Ready to save...</div>
  <button id="saveBtn">Save to Recall</button>
  <script src="popup.js"></script>
</body>
</html>
